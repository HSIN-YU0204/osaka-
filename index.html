<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🇯🇵3Y日本行🍣</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --washi-bg: rgba(252, 251, 250, 0.85);
            --cat-transport: #4A90E2; 
            --cat-food: #FF9F43;      
            --cat-spot: #20BF6B;      
            --cat-shop: #EB3B5A;      
            --cat-hotel: #8854D0;     
            --cat-activity: #0FB9B1;  
            --milktea-bg: #E7D7C1; 
        }

        body {
            font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif;
            margin: 0;
            overflow: hidden;
            background: url('https://images.unsplash.com/photo-1526481280693-3bfa7568e0f3?q=80&w=2071&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
        }

        #sakura-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
        }

        .glass-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            z-index: -1;
        }

        .sidebar {
            width: 90px; height: 100vh; position: fixed; left: 0; top: 0;
            background: #DED8CE;
            display: flex; flex-direction: column; align-items: center; 
            padding-top: 25px; z-index: 100;
            overflow-y: auto; 
            scrollbar-width: none;
        }
        .sidebar::-webkit-scrollbar { display: none; }

        .nav-item {
            writing-mode: vertical-rl; padding: 20px 10px; margin-bottom: 10px; font-size: 14px;
            color: #777; cursor: pointer; border-radius: 0 15px 15px 0; transition: 0.3s;
            flex-shrink: 0;
        }

        .nav-item.active {
            color: #FFF; font-weight: bold;
            background: linear-gradient(135deg, #634832, #3D2B1F);
            box-shadow: 2px 4px 12px rgba(61, 43, 31, 0.3);
        }

        .main-content {
            margin-left: 90px; height: 100vh; overflow-y: auto;
            padding: 35px 20px 130px 20px;
            -webkit-overflow-scrolling: touch;
        }

        .guide-tag { font-size: 11px; padding: 2px 8px; border-radius: 5px; font-weight: bold; margin-right: 5px; color: white; }
        .bg-eat { background-color: #FF6B6B; }
        .bg-buy { background-color: #54A0FF; }
        .bg-snap { background-color: #1DD1A1; }

        .joy-pass-tag {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 20px;
            color: #6B4E71;
            background: linear-gradient(110deg, #E0D1FF 30%, #ffffff 50%, #E0D1FF 70%);
            background-size: 200% 100%;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 2px 6px rgba(107, 78, 113, 0.15);
            animation: shine 3s linear infinite;
        }

        .premium-pass-tag {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 20px;
            color: #784a00;
            background: linear-gradient(110deg, #FFD700 30%, #fff9e6 50%, #FFD700 70%);
            background-size: 200% 100%;
            border: 1px solid rgba(218, 165, 32, 0.6);
            box-shadow: 0 2px 8px rgba(184, 134, 11, 0.3);
            animation: shine 2.5s linear infinite;
        }

        @keyframes shine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .spot-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px; padding: 18px; margin-bottom: 15px;
            border-left: 8px solid #DDD;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s ease;
            cursor: pointer;
            position: relative;
        }

        .card-transport { border-left-color: var(--cat-transport); }
        .card-food { border-left-color: var(--cat-food); }
        .card-spot { border-left-color: var(--cat-spot); }
        .card-activity { border-left-color: var(--cat-activity); }
        .card-shop { border-left-color: var(--cat-shop); }
        .card-hotel { border-left-color: var(--cat-hotel); }

        /* 修改：讓照片在外部直接顯示 */
        .card-preview-img {
            width: 100%;
            height: 160px;
            object-cover: cover;
            border-radius: 12px;
            margin-top: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .details-content { 
            max-height: 0; 
            overflow: hidden; 
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .spot-card.expanded .details-content { 
            max-height: 1000px; 
            margin-top: 15px; 
            border-top: 1px solid #EEE; 
            padding-top: 15px; 
        }

        .checklist-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .checklist-item input[type="checkbox"]:checked + span {
            text-decoration: line-through;
            color: #AAA;
        }

        .tool-box {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px); border-radius: 24px; padding: 20px;
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.6);
        }

        .jp-card {
            background: white; border-radius: 16px; padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }

        #jp-full-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--milktea-bg); z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 40px; text-align: center; display: none;
        }

        .quick-tool-btn {
            background: rgba(255, 249, 196, 0.9); 
            border-radius: 12px;
            padding: 8px 12px;
            color: #856404;
            font-weight: bold;
            font-size: 13px;
        }

        #modal-container { z-index: 3000; position: fixed; }
        #tool-modal {
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 350px;
            background: var(--milktea-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .weather-panel {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .weather-scroll {
            display: flex;
            overflow-x: auto;
            gap: 0;
            scrollbar-width: none;
        }
        .weather-scroll::-webkit-scrollbar { display: none; }

        .weather-item {
            min-width: 90px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 5px 10px;
            text-align: center;
            color: white;
        }
    </style>
</head>
<body>

    <canvas id="sakura-canvas"></canvas>
    <div class="glass-overlay"></div>

    <aside class="sidebar">
        <div class="mb-6 font-bold text-3xl">🏯</div>
        <div class="nav-item" onclick="switchTab(this, 'checklist')" style="background:#E8F5E9; color:#2E7D32;">行前準備</div>
        <div class="nav-item active" onclick="switchTab(this, '7/22')">7/22 (三)</div>
        <div class="nav-item" onclick="switchTab(this, '7/23')">7/23 (四)</div>
        <div class="nav-item" onclick="switchTab(this, '7/24')">7/24 (五)</div>
        <div class="nav-item" onclick="switchTab(this, '7/25')">7/25 (六)</div>
        <div class="nav-item" onclick="switchTab(this, '7/26')">7/26 (日)</div>
        <div class="nav-item" onclick="switchTab(this, '7/27')">7/27 (一)</div>
        <div class="nav-item" onclick="switchTab(this, '7/28')">7/28 (二)</div>
        <div class="nav-item" onclick="switchTab(this, '7/29')">7/29 (三)</div>
        <div class="nav-item" onclick="switchTab(this, 'language')" style="background:#FFF3E0; color:#E65100;">常用日語</div>
        <div class="nav-item" onclick="switchTab(this, 'tools')" style="background:#E0F7FA; color:#006064;">小工具</div>
        <div class="nav-item" onclick="switchTab(this, 'emergency')" style="background:#FFEBEE; color:#C62828;">緊急聯絡</div>
        <div class="h-20"></div>
    </aside>

    <main class="main-content">
        <header class="mb-6">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h1 class="text-4xl font-bold text-white drop-shadow-md" id="current-date">7/22 水曜日</h1>

                </div>
                <button class="quick-tool-btn" onclick="toggleToolModal()">蒟蒻</button>
            </div>
            
            <div id="weather-panel-container" class="weather-panel">
                <div class="flex items-center gap-2 mb-2 px-1">
                    <span class="text-[10px] bg-white/20 text-white px-2 py-0.5 rounded-full font-bold">LIVE</span>
                    <span class="text-xs text-white/80 font-bold">大阪市即時天氣預報</span>
                </div>
                <div id="weather-area" class="weather-scroll">
                    <div class="text-white text-xs animate-pulse p-2">正在取得最新氣象資料...</div>
                </div>
            </div>
        </header>

        <div id="itinerary-area"></div>

        <div id="checklist-area" class="hidden">
            <h2 class="text-2xl font-bold mb-6 text-white drop-shadow-md">🧳 行李準備清單</h2>
            <div class="tool-box mb-6">
                <h3 class="font-bold text-blue-600 mb-3 flex items-center">🪪 證件，文件，卡片</h3>
                <div class="checklist-item"><input type="checkbox"><span>護照/機票/外幣</span></div>
                <div class="checklist-item"><input type="checkbox"><span>保險/訂房憑證</span></div>
            </div>
            <div class="tool-box mb-6">
                <h3 class="font-bold text-orange-600 mb-3 flex items-center">🧴 生活用品</h3>
                <div class="checklist-item"><input type="checkbox"><span>衣物/保養品/雨具</span></div>
            </div>
        </div>

        <div id="language-area" class="hidden">
            <h2 class="text-2xl font-bold mb-6 text-white drop-shadow-md">🗣️ 常用禮貌日語</h2>
            <div id="jp-list"></div>
        </div>

        <div id="tools-area" class="hidden">
            <h2 class="text-2xl font-bold mb-6 text-white drop-shadow-md">🧮 旅行小工具</h2>
            <a href="https://liff.line.me/1655320992-Y8GowEpw/g/kA72aawT1nVFmLhE63QALK" target="_blank" class="block p-6 bg-gradient-to-r from-green-400 to-green-600 text-white rounded-2xl mb-8 text-center font-bold">開啟 LINE 記帳</a>
        </div>

        <div id="emergency-area" class="hidden">
            <h2 class="text-2xl font-bold mb-6 text-white drop-shadow-md">🆘 緊急聯絡資訊</h2>
            <div class="tool-box border-l-8 border-red-500">
                <p class="font-bold text-red-600 text-lg mb-3">🇯🇵 日本當地緊急電話</p>
                <div class="flex justify-between items-center mb-3"><span>警察局 110</span><a href="tel:110" class="bg-red-100 px-4 py-1 rounded-full font-bold">撥打</a></div>
            </div>
        </div>
    </main>

    <div id="jp-full-screen" onclick="this.style.display='none'">
        <div id="full-text-zh" class="text-xl text-amber-900 mb-4 font-bold">中文意思</div>
        <div id="full-text-jp" class="text-4xl text-gray-900 font-bold mb-8 leading-tight">日本語內容</div>
        <button id="full-speak-btn" class="w-20 h-20 bg-white rounded-full shadow-lg flex items-center justify-center text-3xl">🔊</button>
    </div>

    <div id="modal-container" class="hidden">
        <div class="modal-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);" onclick="toggleToolModal()"></div>
        <div id="tool-modal">
            <h3 class="text-xl font-bold text-amber-900 mb-4">🧳 旅行工具箱</h3>
            <textarea class="w-full bg-white/50 p-3 rounded-xl mb-4" placeholder="輸入要翻譯的文字..." id="trans-input"></textarea>
            <div class="flex gap-2">
                <button onclick="openTranslate('zh-TW','ja')" class="flex-1 bg-amber-800 text-white py-2 rounded-xl">中翻日</button>
            </div>
            <button onclick="toggleToolModal()" class="w-full mt-6 border border-amber-800 py-2 rounded-xl">返回行程</button>
        </div>
    </div>

                { time: "15:20", cat: "交通", name: "GK055 起飛", info: "回程航班", img: "https://images.unsplash.com/photo-1530521954074-e64f6810b32d?q=80&w=2070&auto=format&fit=crop" }
            ]}
        };

        const yobiMap = { "7/22": "7/22 水曜日", "7/23": "7/23 木曜日", "7/24": "7/24 金曜日", "7/25": "7/25 土曜日", "7/26": "7/26 日曜日", "7/27": "7/27 月曜日", "7/28": "7/28 火曜日", "7/29": "7/29 水曜日" };

        function switchTab(el, tabId) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            const area = document.getElementById('itinerary-area');
            const checklist = document.getElementById('checklist-area');
            const language = document.getElementById('language-area');
            const tools = document.getElementById('tools-area');
            const emergency = document.getElementById('emergency-area');
            const weather = document.getElementById('weather-panel-container');
            
            [area, checklist, language, tools, emergency, weather].forEach(a => a.classList.add('hidden'));

            if (itineraryData[tabId]) {
                area.classList.remove('hidden'); weather.classList.remove('hidden');
                document.getElementById('current-date').innerText = yobiMap[tabId];
                document.getElementById('day-desc').innerText = itineraryData[tabId].desc;
                renderCards(tabId);
            } else if (tabId === 'checklist') {
                checklist.classList.remove('hidden');
                document.getElementById('current-date').innerText = "行前準備";
            } else if (tabId === 'language') {
                language.classList.remove('hidden');
                document.getElementById('current-date').innerText = "常用日語";
            }
        }

        function renderCards(day) {
            const items = itineraryData[day].items;
            let html = '';
            items.forEach((item) => {
                const typeClass = { '交通': 'card-transport', '美食': 'card-food', '活動': 'card-activity', '景點': 'card-spot', '購物': 'card-shop', '酒店': 'card-hotel' }[item.cat] || 'card-spot';
                const tagsHtml = (item.tags || []).map(tag => `<span class="guide-tag bg-${tag}">${tag.toUpperCase()}</span>`).join('');
                const passTag = item.joyPass ? `<div class="joy-pass-tag">樂享周遊券</div>` : (item.premiumPass ? `<div class="premium-pass-tag">豪華周遊券</div>` : '');

                html += `
                <div class="spot-card ${typeClass}" onclick="this.classList.toggle('expanded')">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="text-xs font-bold text-gray-400 mb-1">${item.cat} | ${item.time}</div>
                            <h3 class="text-xl font-bold text-gray-800">${item.name}</h3>
                            <div class="text-sm text-pink-500 font-bold mt-1">${item.info}</div>
                            <div class="mt-2 flex flex-wrap gap-1">${tagsHtml}</div>
                        </div>
                        <div class="text-pink-500 text-xs font-bold pt-1">點擊展開 ▼</div>
                    </div>
                    ${passTag}
                    <!-- 照片直接顯示 -->
                    ${item.img ? `<img src="${item.img}" class="card-preview-img" alt="${item.name}">` : ''}
                    
                    <div class="details-content">
                        <div class="text-sm text-gray-600 mb-4 font-bold">📖 導遊小故事：${item.story}</div>
                        <div class="text-sm text-orange-600 bg-orange-50 p-3 rounded-lg mb-4">📌 建議：${item.note || '享受旅程！'}</div>
                        ${item.commute ? `<div class="mt-4 text-xs text-blue-500 font-bold">➡️ 下一站：${item.commute}</div>` : ''}
                    </div>
                </div>`;
            });
            document.getElementById('itinerary-area').innerHTML = html;
        }

        async function fetchWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=34.69&longitude=135.50&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo');
                const data = await res.json();
                let h = '';
                data.daily.time.forEach((d, i) => {
                    h += `<div class="weather-item"><div class="text-[10px] opacity-70">${d.split('-')[2]}</div><div class="text-xl">☀️</div><div class="text-[11px] font-bold">${Math.round(data.daily.temperature_2m_min[i])}°/${Math.round(data.daily.temperature_2m_max[i])}°</div></div>`;
                });
                document.getElementById('weather-area').innerHTML = h;
            } catch(e) { document.getElementById('weather-area').innerText = '載入失敗'; }
        }

        function toggleToolModal() { document.getElementById('modal-container').classList.toggle('hidden'); }
        function openTranslate(f,t) { window.open(`https://translate.google.com/?sl=${f}&tl=${t}&text=${encodeURIComponent(document.getElementById('trans-input').value)}&op=translate`, '_blank'); }

        const canvas = document.getElementById('sakura-canvas');
        const ctx = canvas.getContext('2d');
        let sakuraArray = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();
        class Sakura {
            constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 5 + 2; this.speed = Math.random() * 1 + 0.5; this.wind = Math.random() * 0.5 - 0.25; }
            draw() { ctx.beginPath(); ctx.ellipse(this.x, this.y, this.size, this.size/2, 45, 0, Math.PI*2); ctx.fillStyle = '#FFC0CB'; ctx.fill(); }
            update() { this.y += this.speed; this.x += this.wind; if (this.y > canvas.height) this.y = -20; }
        }
        for (let i=0; i<30; i++) sakuraArray.push(new Sakura());
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); sakuraArray.forEach(s => { s.draw(); s.update(); }); requestAnimationFrame(animate); }
        animate();

        window.onload = () => { renderCards("7/22"); fetchWeather(); };
    </script>
</body>
</html>
