<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Osaka Bloom 2026 | 景點導覽版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Zen+Old+Mincho&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --washi-bg: #FAF9F6;
            --sumi-ink: #2D2D2D;
            --fuji-blue: #4A6792;
            --wood-trim: #8D775F;
            --must-eat: #D97706;   /* 橘黃 */
            --must-buy: #7C3AED;   /* 紫 */
            --must-snap: #059669;  /* 綠 */
        }

        body {
            font-family: 'Zen Old Mincho', 'Noto Serif JP', serif;
            background-color: var(--washi-bg);
            color: var(--sumi-ink);
            margin: 0;
            overflow: hidden;
        }

        /* 側邊導航 */
        .sidebar {
            width: 70px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: white;
            border-right: 1px solid #EAEAEA;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            z-index: 50;
            overflow-y: auto;
        }

        .nav-item {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            padding: 15px 5px;
            margin-bottom: 5px;
            font-size: 12px;
            letter-spacing: 1px;
            color: #AAA;
            transition: all 0.3s;
            cursor: pointer;
            border-left: 2px solid transparent;
        }

        .nav-item.active {
            color: var(--sumi-ink);
            font-weight: bold;
            border-left: 2px solid var(--wood-trim);
            background: #F8F8F8;
        }

        /* 主內容區 */
        .main-content {
            margin-left: 70px;
            height: 100vh;
            overflow-y: auto;
            padding: 25px 15px 120px 15px;
        }

        .section-content { display: none; }
        .section-active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* 景點卡片樣式 */
        .spot-card {
            background: white;
            border: 1px solid #EEE;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            position: relative;
        }

        .cat-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            background: #F3F4F6;
            color: #6B7280;
            font-weight: bold;
        }

        .highlight-tag {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 2px;
            font-weight: bold;
            color: white;
            margin-right: 4px;
        }
        .tag-eat { background-color: var(--must-eat); }
        .tag-buy { background-color: var(--must-buy); }
        .tag-snap { background-color: var(--must-snap); }

        .commute-info {
            font-size: 11px;
            color: var(--wood-trim);
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #EEE;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--sumi-ink);
            color: white;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 11px;
            margin-top: 12px;
        }

        .sidebar::-webkit-scrollbar { display: none; }
    </style>
</head>

        function switchTab(el, tabId) {
            // 切換導航樣式
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');

            // 隱藏所有區域
            document.getElementById('itinerary-area').classList.remove('section-active');
            document.getElementById('tools-area').classList.remove('section-active');
            document.getElementById('emergency-area').classList.remove('section-active');

            if (itineraryData[tabId]) {
                document.getElementById('current-date').innerText = tabId;
                document.getElementById('day-desc').innerText = itineraryData[tabId].desc;
                renderCards(tabId);
                document.getElementById('itinerary-area').classList.add('section-active');
            } else {
                document.getElementById(tabId + '-area').classList.add('section-active');
                document.getElementById('current-date').innerText = el.innerText;
                document.getElementById('day-desc').innerText = "Travel Utils";
            }
            
            // 捲回頂部
            document.querySelector('.main-content').scrollTop = 0;
        }

        function renderCards(day) {
            const items = itineraryData[day].items;
            let html = '';
            items.forEach(item => {
                let tagsHtml = '';
                if (item.tags) {
                    item.tags.forEach(t => {
                        const label = t === 'eat' ? '必吃' : (t === 'buy' ? '必買' : '必拍');
                        tagsHtml += `<span class="highlight-tag tag-${t}">${label}</span>`;
                    });
                }

                html += `
                <div class="spot-card">
                    <div class="flex justify-between items-center mb-2">
                        <span class="cat-badge">${item.cat}</span>
                        <span class="text-[11px] font-bold text-gray-300">${item.time}</span>
                    </div>
                    <h3 class="text-base font-bold text-gray-800">${item.name}</h3>
                    <p class="text-[11px] text-gray-500 mt-1">${item.info}</p>
                    ${tagsHtml ? `<div class="mt-2">${tagsHtml}</div>` : ''}
                    ${item.note ? `<p class="text-[10px] text-gray-400 mt-2 bg-gray-50 p-1.5 rounded italic">※ ${item.note}</p>` : ''}
                    
                    <div class="flex justify-between items-end">
                        ${item.map ? `<a href="${item.map}" target="_blank" class="nav-btn">📍 導航</a>` : '<div></div>'}
                    </div>

                    ${item.commute ? `
                    <div class="commute-info">
                        <span>${item.commute}</span>
                    </div>` : ''}
                </div>`;
            });
            document.getElementById('itinerary-area').innerHTML = html;
        }
