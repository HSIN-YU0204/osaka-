<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Osaka Bloom 2026 | 導遊增強版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --washi-bg: rgba(252, 251, 250, 0.85);
            --cat-transport: #4A90E2; 
            --cat-food: #FF9F43;      
            --cat-spot: #20BF6B;      
            --cat-shop: #EB3B5A;      
            --cat-hotel: #8854D0;     
            --cat-activity: #0FB9B1;  
        }

        body {
            font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif;
            margin: 0;
            overflow: hidden;
            background: url('https://images.unsplash.com/photo-1526481280693-3bfa7568e0f3?q=80&w=2071&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
        }

        .glass-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            z-index: -1;
        }

        .sidebar {
            width: 90px; height: 100vh; position: fixed; left: 0; top: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex; flex-direction: column; align-items: center; padding-top: 25px; z-index: 50;
        }

        .nav-item {
            writing-mode: vertical-rl; padding: 20px 10px; margin-bottom: 10px; font-size: 15px;
            color: #777; cursor: pointer; border-radius: 0 15px 15px 0; transition: 0.3s;
        }

        .nav-item.active {
            color: #FFF; font-weight: bold;
            background: linear-gradient(135deg, #FF6B6B, #F06595);
            box-shadow: 2px 4px 12px rgba(240, 101, 149, 0.3);
        }

        .main-content {
            margin-left: 90px; height: 100vh; overflow-y: auto;
            padding: 35px 20px 130px 20px;
        }

        /* 導遊職責標籤 */
        .guide-tag {
            font-size: 11px; padding: 2px 8px; border-radius: 5px; font-weight: bold; margin-right: 5px; color: white;
        }
        .bg-must-eat { background-color: #FF6B6B; }
        .bg-must-buy { background-color: #54A0FF; }
        .bg-must-go { background-color: #1DD1A1; }

        /* 行程卡片 */
        .spot-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px; padding: 18px; margin-bottom: 15px;
            border-left: 8px solid #DDD;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .card-transport { border-left-color: var(--cat-transport); }
        .card-food { border-left-color: var(--cat-food); }
        .card-spot { border-left-color: var(--cat-spot); }
        .card-activity { border-left-color: var(--cat-activity); }

        .details-content {
            max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out;
            border-top: 0px solid #EEE; margin-top: 0;
        }

        .spot-card.expanded .details-content {
            max-height: 500px; margin-top: 15px; border-top-width: 1px; padding-top: 15px;
        }

        .tool-box {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px); border-radius: 24px; padding: 20px;
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>

    <div class="glass-overlay"></div>

    <aside class="sidebar">
        <div class="mb-8 font-bold text-3xl">🌸</div>
        <div class="nav-item active" onclick="switchTab(this, '7/22')">7/22 (三)</div>
        <div class="nav-item" onclick="switchTab(this, '7/23')">7/23 (四)</div>
        <div class="nav-item" onclick="switchTab(this, '7/24')">7/24 (五)</div>
        <div class="nav-item" onclick="switchTab(this, '7/25')">7/25 (六)</div>
        <div class="nav-item" onclick="switchTab(this, '7/26')">7/26 (日)</div>
        <div class="nav-item" onclick="switchTab(this, '7/27')">7/27 (一)</div>
        <div class="nav-item" onclick="switchTab(this, '7/28')">7/28 (二)</div>
        <div class="nav-item" onclick="switchTab(this, '7/29')">7/29 (三)</div>
        <div class="h-8"></div>
        <div class="nav-item" onclick="switchTab(this, 'tools')" style="background:#E0F7FA; color:#006064;">工具</div>
    </aside>

    <main class="main-content">
        <header class="mb-6">
            <h1 class="text-4xl font-bold text-white drop-shadow-md" id="current-date">7/22</h1>
            <p id="day-desc" class="text-lg text-pink-100 font-bold mt-1 drop-shadow-sm">Osaka Trip Start!</p>
        </header>

        <div id="itinerary-area"></div>

        <div id="tools-area" class="hidden text-white">
            <h2 class="text-2xl font-bold mb-6">🧮 旅行小工具</h2>
            <div class="tool-box text-gray-800">
                <h4 class="font-bold text-lg mb-4 text-blue-600">🇯🇵 大阪即時天氣</h4>
                <iframe src="https://www.meteoblue.com/en/weather/widget/three/osaka_japan_1853909?geoloc=fixed&nocurrent=0&noforecast=0&days=4&tempunit=CELSIUS&windunit=KILOMETER_PER_HOUR&layout=light" frameborder="0" scrolling="NO" style="width: 100%; height: 230px; border-radius: 12px;"></iframe>
            </div>
            <a href="https://liff.line.me/1655320992-Y8GowEpw/g/kA72aawT1nVFmLhE63QALK" target="_blank" class="block p-6 bg-green-500 rounded-2xl text-center font-bold text-xl">開啟 LINE 記帳</a>
        </div>
    </main>

    <script>
        const itineraryData = {
            "7/22": { desc: "啟程：抵達關西機場", items: [
                { time: "18:20", cat: "交通", name: "桃園機場 (GK054)", info: "預約代號: <span class='font-bold text-red-500'>TPE888</span>", story: "虎航櫃檯位於第一航廈，建議起飛前 2.5 小時抵達。", commute: "✈️ 飛行約 3小時40分" },
                { time: "22:00", cat: "交通", name: "關西機場 T1", info: "領取行李與入境", story: "入境手續約 40-60 分鐘，記得預先填好 Visit Japan Web。", commute: "🚌 乘機場巴士前往市區 (47min)" },
                { time: "23:00", cat: "酒店", name: "住一八號店", info: "入住代碼: <span class='font-bold text-red-500'>1234#</span>", story: "位於瓦屋町，附近有 24 小時便利商店。", map: "住一八號店" }
            ]},
            "7/23": { desc: "大阪：心齋橋與道頓堀", items: [
                { time: "08:15", cat: "活動", name: "心齋橋筋商店街", info: "藥妝與補貨", tags: [{t:"必買", c:"must-buy"}], story: "早晨人潮較少，拍照最美。**松本清**藥妝最齊全。", menu: "必買：合利他命 EX Plus、面膜", commute: "👣 步行 4 分鐘" },
                { time: "11:19", cat: "美食", name: "Red Rock 和牛丼", info: "火山牛肉丼始祖", tags: [{t:"必吃", c:"must-eat"}], story: "神戶發跡的名店，牛肉層層疊疊像火山一樣。", menu: "必點：**Roast Beef Don** (烤牛肉蓋飯)", map: "Red Rock Amemura", commute: "🚗 19 分鐘" },
                { time: "14:00", cat: "活動", name: "通天閣", info: "溜滑梯體驗", tags: [{t:"必拍", c:"must-go"}], story: "大阪象徵，新蓋的 **Tower Slider** 全長 60 公尺，10 秒衝到底！", map: "通天閣", commute: "👣 10 分鐘" },
                { time: "17:16", cat: "美食", name: "大衆すき焼き 北斗", info: "平價壽喜燒", tags: [{t:"必吃", c:"must-eat"}], story: "在地人也愛的壽喜燒，肉質極佳且消費平實。", menu: "必點：**黑毛和牛壽喜燒定食**", map: "大衆すき焼き 北斗", commute: "👣 10 分鐘" }
            ]},
            "7/24": { desc: "京都：清水寺古都漫步", items: [
                { time: "09:00", cat: "景點", name: "清水寺", info: "世界遺產舞台", tags: [{t:"必拍", c:"must-go"}], story: "全木造建築，完全沒用一根釘子。建議走到**奧之院**拍大舞台全景。", commute: "👣 步行至產寧坂" },
                { time: "11:00", cat: "美食", name: "二年坂星巴克", info: "榻榻米特色店", tags: [{t:"必拍", c:"must-go"}], story: "全球唯一有榻榻米座位的星巴克，外觀是百年古民家。", menu: "必點：**京都限定抹茶星冰樂**", map: "Starbucks Coffee Kyoto Ninenzaka Yasaka Chaya" },
                { time: "14:30", cat: "美食", name: "錦市場", info: "京都的廚房", tags: [{t:"必吃", c:"must-eat"}], story: "擁有 400 年歷史，是感受京都庶民生活最好的地方。", menu: "必吃：**章魚燒蛋、三木雞卵玉子燒**", map: "錦市場" }
            ]}
            // 可依此類推增加更多天數...
        };

        function switchTab(el, tabId) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');

            const area = document.getElementById('itinerary-area');
            const tools = document.getElementById('tools-area');
            
            if (itineraryData[tabId]) {
                area.classList.remove('hidden');
                tools.classList.add('hidden');
                document.getElementById('current-date').innerText = tabId;
                document.getElementById('day-desc').innerText = itineraryData[tabId].desc;
                renderCards(tabId);
            } else {
                area.classList.add('hidden');
                tools.classList.remove('hidden');
                document.getElementById('current-date').innerText = "工具箱";
            }
        }

        function renderCards(day) {
            const items = itineraryData[day].items;
            let html = '';
            items.forEach((item, index) => {
                const typeClass = item.cat === '交通' ? 'card-transport' : (item.cat === '美食' ? 'card-food' : (item.cat === '活動' ? 'card-activity' : 'card-spot'));
                
                let tagsHtml = '';
                if(item.tags) {
                    item.tags.forEach(tag => {
                        tagsHtml += `<span class="guide-tag bg-${tag.c}">${tag.t}</span>`;
                    });
                }

                // 自動生成導航連結
                const mapQuery = encodeURIComponent(item.map || item.name);
                const mapLink = `https://www.google.com/maps/search/?api=1&query=${mapQuery}`;

                html += `
                <div class="spot-card ${typeClass}" onclick="this.classList.toggle('expanded')">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="text-xs font-bold text-gray-400 mb-1">${item.cat} | ${item.time}</div>
                            <h3 class="text-xl font-bold text-gray-800">${item.name}</h3>
                            <div class="mt-2">${tagsHtml}</div>
                        </div>
                        <div class="text-pink-500 text-sm">詳情 ▼</div>
                    </div>
                    
                    <div class="details-content">
                        <p class="text-sm text-gray-600 leading-relaxed mb-3">📖 <b>導遊說故事：</b><br>${item.story}</p>
                        ${item.menu ? `<p class="text-sm text-orange-600 font-bold mb-3">🍴 必點推薦：<br>${item.menu}</p>` : ''}
                        <div class="flex gap-2">
                            <a href="${mapLink}" target="_blank" class="flex-1 bg-gray-800 text-white text-center py-2 rounded-xl text-sm font-bold" onclick="event.stopPropagation()">🧭 開啟導航</a>
                        </div>
                        ${item.commute ? `<div class="mt-3 text-xs text-blue-500 font-bold italic">➡️ 下個點：${item.commute}</div>` : ''}
                    </div>
                </div>`;
            });
            document.getElementById('itinerary-area').innerHTML = html;
        }

        // 初始化顯示第一天
        renderCards("7/22");
    </script>
</body>
</html>
