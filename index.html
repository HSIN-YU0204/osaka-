<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Y 日本行 🍣</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f4f1de; }
        .tab-active { background-color: #3d405b; color: white; }
        .sakura { position: fixed; top: -10%; color: #ffb7c5; pointer-events: none; z-index: 999; animation: fall linear infinite; }
        @keyframes fall {
            0% { transform: translateY(0vh) translateX(0) rotate(0deg); }
            100% { transform: translateY(110vh) translateX(100px) rotate(360deg); }
        }
    </style>
</head>
<body class="flex min-h-screen">

    <div class="w-20 bg-[#e0d9cf] flex flex-col items-center py-6 border-r border-gray-300 sticky top-0 h-screen shadow-lg">
        <div class="mb-8 text-2xl">🏯</div>
        <div class="flex flex-col space-y-4 text-xs font-bold text-gray-600">
            <div class="p-2 text-center rounded-lg bg-green-100 text-green-700">行前準備</div>
            <div class="p-2 text-center">7/22 (三)</div>
            <div class="p-2 text-center tab-active rounded-l-xl shadow-md">7/23 (四)</div>
            <div class="p-2 text-center">7/24 (五)</div>
            <div class="p-2 text-center">7/25 (六)</div>
            <div class="p-2 text-center">7/26 (日)</div>
        </div>
    </div>

    <main class="flex-1 p-4 overflow-y-auto relative">
        <script>
            for(let i=0; i<20; i++){
                let leaf = document.createElement('div');
                leaf.className = 'sakura';
                leaf.innerHTML = '🌸';
                leaf.style.left = Math.random() * 100 + 'vw';
                leaf.style.animationDuration = (Math.random() * 3 + 2) + 's';
                leaf.style.opacity = Math.random();
                document.body.appendChild(leaf);
            }
        </script>

        <div class="max-w-md mx-auto space-y-6">
            
            <div class="bg-white rounded-3xl shadow-xl overflow-hidden border-l-8 border-pink-400 transform transition hover:scale-105">
                <div class="p-4">
                    <div class="flex justify-between items-center text-gray-400 text-sm mb-2">
                        <span>購物 | 09:15</span>
                        <span class="text-pink-500 font-bold">MORE ▼</span>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800">心齋橋筋</h2>
                    <p class="text-pink-400 font-medium mb-3">藥妝服飾雜貨</p>
                    <div class="flex space-x-2 mb-4">
                        <span class="bg-blue-400 text-white px-3 py-1 rounded-full text-xs shadow-sm">BUY</span>
                        <span class="bg-green-400 text-white px-3 py-1 rounded-full text-xs shadow-sm">SNAP</span>
                    </div>
                    <div class="rounded-xl overflow-hidden h-48 bg-gray-100">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Shinsaibashi-suji_Shopping_Arcade_2016.jpg/640px-Shinsaibashi-suji_Shopping_Arcade_2016.jpg" 
                             alt="心齋橋" class="w-full h-full object-cover">
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-xl overflow-hidden border-l-8 border-orange-400 transform transition hover:scale-105">
                <div class="p-4">
                    <div class="flex justify-between items-center text-gray-400 text-sm mb-2">
                        <span>美食 | 11:19</span>
                        <span class="text-pink-500 font-bold">MORE ▼</span>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800">Red Rock 和牛丼</h2>
                    <p class="text-pink-400 font-medium mb-3">必吃肉食丼飯</p>
                    <div class="flex space-x-2 mb-4">
                        <span class="bg-red-400 text-white px-3 py-1 rounded-full text-xs shadow-sm">EAT</span>
                    </div>
                    <div class="rounded-xl overflow-hidden h-48 bg-gray-100">
                        <img src="https://lh3.googleusercontent.com/p/AF1QipM5xH-Aayf5yBqF6Z6kKk7H3N9lI9wXmH8T6o2s=s640" 
                             alt="Red Rock" class="w-full h-full object-cover">
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-xl overflow-hidden border-l-8 border-green-400 transform transition hover:scale-105">
                <div class="p-4">
                    <div class="flex justify-between items-center text-gray-400 text-sm mb-2">
                        <span>景點 | 12:19</span>
                        <span class="text-pink-500 font-bold">MORE ▼</span>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800">難波八阪神社</h2>
                    <p class="text-pink-400 font-medium mb-3">巨獅頭消除厄運</p>
                    <div class="flex space-x-2 mb-4">
                        <span class="bg-emerald-400 text-white px-3 py-1 rounded-full text-xs shadow-sm">SNAP</span>
                    </div>
                    <div class="rounded-xl overflow-hidden h-48 bg-gray-100">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c9/Namba_Yasaka_Shrine_Head.jpg/640px-Namba_Yasaka_Shrine_Head.jpg" 
                             alt="難波八阪神社" class="w-full h-full object-cover">
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-xl overflow-hidden border-l-8 border-yellow-400 transform transition hover:scale-105">
                <div class="p-4">
                    <div class="flex justify-between items-center text-gray-400 text-sm mb-2">
                        <span>美食 | 14:30</span>
                        <span class="text-pink-500 font-bold">MORE ▼</span>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800">錦市場</h2>
                    <p class="text-pink-400 font-medium mb-3">京都的廚房</p>
                    <div class="flex space-x-2 mb-4">
                        <span class="bg-red-400 text-white px-3 py-1 rounded-full text-xs shadow-sm">EAT</span>
                        <span class="bg-blue-400 text-white px-3 py-1 rounded-full text-xs shadow-sm">BUY</span>
                    </div>
                    <div class="rounded-xl overflow-hidden h-48 bg-gray-100">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/73/Nishiki_Market_DSC06155.JPG/640px-Nishiki_Market_DSC06155.JPG" 
                             alt="錦市場" class="w-full h-full object-cover">
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around py-3 md:hidden">
        <i class="fas fa-calendar-alt text-gray-400"></i>
        <i class="fas fa-map-marked-alt text-gray-400"></i>
        <i class="fas fa-utensils text-orange-400"></i>
        <i class="fas fa-cog text-gray-400"></i>
    </div>

</body>
</html>
