<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🇯🇵3Y日本行🍣</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --washi-bg: rgba(252, 251, 250, 0.85);
            --cat-transport: #4A90E2; 
            --cat-food: #FF9F43;      
            --cat-spot: #20BF6B;      
            --cat-shop: #EB3B5A;      
            --cat-hotel: #8854D0;     
            --cat-activity: #0FB9B1;  
            --milktea-bg: #E7D7C1; 
        }

        body {
            font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif;
            margin: 0;
            overflow: hidden;
            background: url('https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
        }

        #sakura-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 99;
        }

        .glass-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            z-index: -1;
        }

        .sidebar {
            width: 90px; height: 100vh; position: fixed; left: 0; top: 0;
            background: #DED8CE;
            display: flex; flex-direction: column; align-items: center; 
            padding-top: 25px; z-index: 100;
            overflow-y: auto; scrollbar-width: none;
        }
        .sidebar::-webkit-scrollbar { display: none; }

        .nav-item {
            writing-mode: vertical-rl; padding: 20px 10px; margin-bottom: 10px; font-size: 14px;
            color: #777; cursor: pointer; border-radius: 0 15px 15px 0; transition: 0.3s;
            flex-shrink: 0;
        }

        .nav-item.active {
            color: #FFF; font-weight: bold;
            background: linear-gradient(135deg, #634832, #3D2B1F);
            box-shadow: 2px 4px 12px rgba(61, 43, 31, 0.3);
        }

        .main-content {
            margin-left: 90px; height: 100vh; overflow-y: auto;
            padding: 35px 20px 130px 20px;
            -webkit-overflow-scrolling: touch;
        }

        .guide-tag { font-size: 11px; padding: 2px 8px; border-radius: 5px; font-weight: bold; margin-right: 5px; color: white; }
        .bg-eat { background-color: #FF6B6B; }
        .bg-buy { background-color: #54A0FF; }
        .bg-snap { background-color: #1DD1A1; }

        .joy-pass-tag {
            position: absolute; top: 12px; right: 12px;
            font-size: 10px; font-weight: bold; padding: 2px 8px;
            border-radius: 20px; color: #6B4E71;
            background: linear-gradient(110deg, #E0D1FF 30%, #ffffff 50%, #E0D1FF 70%);
            background-size: 200% 100%; border: 1px solid rgba(255, 255, 255, 0.5);
            animation: shine 3s linear infinite; z-index: 10;
        }

        .premium-pass-tag {
            position: absolute; top: 12px; right: 12px;
            font-size: 10px; font-weight: bold; padding: 2px 8px;
            border-radius: 20px; color: #784a00;
            background: linear-gradient(110deg, #FFD700 30%, #fff9e6 50%, #FFD700 70%);
            background-size: 200% 100%; border: 1px solid rgba(218, 165, 32, 0.6);
            animation: shine 2.5s linear infinite; z-index: 10;
        }

        @keyframes shine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .spot-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px; padding: 18px; margin-bottom: 20px;
            border-left: 8px solid #DDD;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s ease;
            cursor: pointer; position: relative;
            overflow: hidden;
        }

        .card-transport { border-left-color: var(--cat-transport); }
        .card-food { border-left-color: var(--cat-food); }
        .card-spot { border-left-color: var(--cat-spot); }
        .card-activity { border-left-color: var(--cat-activity); }
        .card-shop { border-left-color: var(--cat-shop); }
        .card-hotel { border-left-color: var(--cat-hotel); }

        /* 照片不再隱藏於展開內容中 */
        .spot-img-top {
            width: 100%; height: 160px; object-fit: cover;
            border-radius: 12px; margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .details-content { 
            max-height: 0; overflow: hidden; 
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .spot-card.expanded .details-content { 
            max-height: 1000px; margin-top: 15px; 
            border-top: 1px solid #EEE; padding-top: 15px; 
        }

        .weather-panel {
            background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(12px);
            border-radius: 24px; padding: 15px; margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .weather-scroll { display: flex; overflow-x: auto; gap: 0; scrollbar-width: none; }
        .weather-scroll::-webkit-scrollbar { display: none; }

        .weather-item { min-width: 90px; border-right: 1px solid rgba(255, 255, 255, 0.1); padding: 5px 10px; text-align: center; color: white; }

        .checklist-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .checklist-item input[type="checkbox"] { width: 20px; height: 20px; margin-right: 12px; accent-color: #20BF6B; }

        .tool-box { background: rgba(255, 255, 255, 0.85); border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.6); }

        .jp-card { background: white; border-radius: 16px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }

        #jp-full-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--milktea-bg); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center; display: none; }
    </style>
</head>

        function renderCards(day) {
            const items = itineraryData[day].items;
            let html = '';
            items.forEach((item) => {
                const typeClass = { '交通': 'card-transport', '美食': 'card-food', '活動': 'card-activity', '景點': 'card-spot', '購物': 'card-shop', '酒店': 'card-hotel' }[item.cat] || 'card-spot';

                let passTagHtml = item.joyPass ? `<div class="joy-pass-tag">樂享券</div>` : (item.premiumPass ? `<div class="premium-pass-tag">豪華券</div>` : '');

                html += `
                <div class="spot-card ${typeClass}" onclick="this.classList.toggle('expanded')">
                    ${passTagHtml}
                    <!-- 圖片現在直接顯現，位於卡片頂部 -->
                    ${item.img ? `<img src="${item.img}" class="spot-img-top" alt="${item.name}">` : ''}
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="text-[10px] font-bold text-gray-400 mb-1">${item.cat} | ${item.time}</div>
                            <h3 class="text-lg font-bold text-gray-800">${item.name}</h3>
                            <div class="text-xs text-pink-500 font-bold mt-1">${item.info}</div>
                            <div class="mt-2 flex flex-wrap gap-1">${tagsHtml}</div>
                        </div>
                        <div class="text-pink-500 text-[10px] font-bold pt-1">建議 ▼</div>
                    </div>
                    <div class="details-content">
                        <div class="text-xs text-gray-600 mb-4">📖 ${item.story}</div>
                        <div class="text-xs text-orange-600 bg-orange-50 p-3 rounded-lg mb-2">📌 ${item.note || '無特別說明'}</div>
                    </div>
                </div>`;
            });
            document.getElementById('itinerary-area').innerHTML = html;
        }

        // --- 以下功能維持不變 ---
        function switchTab(el, tabId) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            const sections = ['itinerary-area', 'checklist-area', 'language-area', 'tools-area', 'emergency-area', 'weather-panel-container'];
            sections.forEach(id => document.getElementById(id)?.classList.add('hidden'));

            if (itineraryData[tabId]) {
                document.getElementById('itinerary-area').classList.remove('hidden');
                document.getElementById('weather-panel-container').classList.remove('hidden');
                document.getElementById('current-date').innerText = yobiMap[tabId];
                document.getElementById('day-desc').innerText = itineraryData[tabId].desc;
                renderCards(tabId);
            } else {
                document.getElementById(`${tabId}-area`)?.classList.remove('hidden');
                document.getElementById('current-date').innerText = el.innerText;
            }
            document.querySelector('.main-content').scrollTop = 0;
        }

        async function fetchWeather() {
            const weatherArea = document.getElementById('weather-area');
            try {
                const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=34.69&longitude=135.50&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo');
                const data = await response.json();
                let html = '';
                data.daily.time.forEach((date, i) => {
                    const icon = data.daily.weathercode[i] <= 3 ? '☀️' : '☁️';
                    html += `<div class="weather-item"><div class="text-[10px] opacity-70">${date.split('-')[2]}</div><div class="text-xl">${icon}</div><div class="text-[11px] font-bold">${Math.round(data.daily.temperature_2m_min[i])}°/${Math.round(data.daily.temperature_2m_max[i])}°</div></div>`;
                });
                weatherArea.innerHTML = html;
            } catch (e) { weatherArea.innerHTML = '<div class="text-white text-xs">載入失敗</div>'; }
        }

        const canvas = document.getElementById('sakura-canvas');
        const ctx = canvas.getContext('2d');
        let sakuraArray = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();
        class Sakura {
            constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 5 + 2; this.speed = Math.random() * 1 + 0.5; this.angle = Math.random() * 360; }
            draw() { ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle); ctx.beginPath(); ctx.ellipse(0, 0, this.size, this.size/2, 0, 0, Math.PI*2); ctx.fillStyle = '#FFC0CB'; ctx.fill(); ctx.restore(); }
            update() { this.y += this.speed; if (this.y > canvas.height) this.y = -10; this.angle += 0.02; }
        }
        for(let i=0; i<30; i++) sakuraArray.push(new Sakura());
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); sakuraArray.forEach(s => { s.draw(); s.update(); }); requestAnimationFrame(animate); }
        animate();

        window.onload = () => { renderCards("7/22"); fetchWeather(); };
    </script>
</body>
</html>
