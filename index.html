<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Osaka Bloom | 2026 櫻花漫步版</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --jp-red: #D73C3E;
            --fuji-blue: #6C8EBF;
            --paper-bg: #FAF9F6;
        }
        body { 
            font-family: 'Zen Maru Gothic', sans-serif; 
            background-color: var(--paper-bg); 
            color: #4A4A4A;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(215, 60, 62, 0.03) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(108, 142, 191, 0.05) 0%, transparent 25%);
            -webkit-tap-highlight-color: transparent;
        }
        
        .jp-decoration { position: fixed; z-index: -1; opacity: 0.15; pointer-events: none; }
        .fuji-blue { color: var(--fuji-blue); }
        .bg-fuji-blue { background-color: var(--fuji-blue); }
        .glass-header { background: rgba(250, 249, 246, 0.85); backdrop-filter: blur(10px); }
        
        .tab-active { 
            background-color: var(--fuji-blue) !important; 
            color: white !important; 
            box-shadow: 0 4px 12px rgba(108, 142, 191, 0.3); 
        }
        
        .page-content { display: none; animation: fadeIn 0.4s ease-out; }
        .page-active { display: block; }
        .nav-active { color: var(--fuji-blue) !important; font-weight: bold; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 分類標籤樣式 */
        .cat-tag { font-size: 9px; padding: 2px 8px; border-radius: 99px; font-weight: bold; }
        .cat-tag-景點 { background-color: #E0F2FE; color: #0369A1; }
        .cat-tag-美食 { background-color: #FFEDD5; color: #9A3412; }
        .cat-tag-交通 { background-color: #F1F5F9; color: #475569; }
        .cat-tag-住宿 { background-color: #F3E8FF; color: #7E22CE; }

        #story-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            z-index: 1000; align-items: center; justify-content: center; padding: 20px;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white; border-radius: 28px; max-width: 400px; width: 100%;
            padding: 28px; position: relative; animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalPop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .scroll-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32">

    <!-- 背景裝飾 -->
    <div class="jp-decoration text-4xl" style="top: 15%; left: 5%;">🗻</div>
    <div class="jp-decoration text-4xl" style="top: 45%; right: 8%;">🍣</div>
    <div class="jp-decoration text-4xl" style="top: 75%; left: 10%;">🏮</div>
    <div class="jp-decoration text-4xl" style="bottom: 10%; right: 5%;">🌸</div>

    <header class="sticky top-0 z-50 glass-header px-6 py-4 border-b border-gray-100">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold fuji-blue leading-tight">Osaka Bloom</h1>
                <p id="countdown-text" class="text-[10px] text-gray-400 font-medium">Loading...</p>
            </div>
            <div id="countdown-badge" class="hidden">
                <span class="text-[10px] bg-red-100 text-red-500 px-3 py-1 rounded-full font-bold animate-pulse">USJ 快速通關提醒</span>
            </div>
        </div>
    </header>

    <!-- 行程頁面 -->
    <div id="page-itinerary" class="page-content page-active">
        <nav id="date-nav" class="flex overflow-x-auto px-4 py-4 space-x-3 sticky top-[68px] z-40 bg-[#FAF9F6]/95 backdrop-blur-sm border-b border-gray-50 scroll-hide"></nav>
        <main id="itinerary-content" class="px-5 mt-4"></main>
    </div>

    <!-- 指南頁面 -->
    <div id="page-guide" class="page-content px-5 pt-6">
        <div class="bg-[#8D775F] text-white p-6 mb-8 rounded-[32px] shadow-lg relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex items-center gap-3 mb-4">
                    <span class="text-2xl">🧮</span>
                    <h2 class="text-lg font-bold">旅行記帳</h2>
                </div>
                <p class="text-xs opacity-90 mb-4">點擊下方按鈕開啟 LINE 群組記帳工具</p>
                <a href="https://liff.line.me/1655320992-Y8GowEpw/g/kA72aawT1nVFmLhE63QALK" target="_blank" class="block w-full bg-white text-[#8D775F] text-center py-4 rounded-2xl font-bold text-sm shadow-md active:scale-95 transition-transform">
                    開啟 LINE 記帳小工具
                </a>
            </div>
            <span class="absolute -right-4 -bottom-4 text-7xl opacity-20">💰</span>
        </div>
        
        <h3 class="font-bold text-gray-700 mb-4 px-2 flex items-center gap-2">
            <span>🏠</span> 住宿附近商家 & 宵夜
        </h3>
        <div class="space-y-4">
            <!-- 商家卡片 -->
            <div class="bg-white/80 backdrop-blur-sm p-4 rounded-3xl border border-gray-100 shadow-sm flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-2xl">🏪</div>
                <div class="flex-1">
                    <h4 class="font-bold text-sm">LAWSON 瓦屋町三丁目店</h4>
                    <p class="text-[10px] text-gray-400">24小時營業・最近便利店</p>
                </div>
                <a href="https://maps.app.goo.gl/ZUxzKoPJthb9Lkgc7" class="text-xs fuji-blue font-bold px-4 py-2 bg-blue-50 rounded-full">地圖</a>
            </div>
            <div class="bg-white/80 backdrop-blur-sm p-4 rounded-3xl border border-gray-100 shadow-sm flex items-center gap-4">
                <div class="w-12 h-12 bg-red-50 rounded-2xl flex items-center justify-center text-2xl">🍜</div>
                <div class="flex-1">
                    <h4 class="font-bold text-sm text-red-600">野口太郎拉麵店</h4>
                    <p class="text-[10px] text-gray-400">推薦宵夜・營業至 04:00</p>
                </div>
                <a href="https://maps.app.goo.gl/nALJy2Jkg6ZX6qB18" class="text-xs fuji-blue font-bold px-4 py-2 bg-blue-50 rounded-full">地圖</a>
            </div>
        </div>
    </div>

    <!-- 故事彈窗 -->
    <div id="story-modal" onclick="closeStory()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex items-center gap-3 mb-4">
                <span class="text-2xl" id="modal-icon">🚩</span>
                <h3 id="modal-title" class="font-bold text-lg text-gray-800"></h3>
            </div>
            <div id="modal-body" class="text-sm leading-relaxed text-gray-600 mb-8 max-h-[60vh] overflow-y-auto"></div>
            <button onclick="closeStory()" class="w-full bg-gray-800 text-white py-4 rounded-2xl font-bold text-sm active:scale-95 transition-transform">
                我知道了
            </button>
        </div>
    </div>

    <!-- 底部導航 -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white/90 backdrop-blur-md rounded-[32px] shadow-2xl border border-gray-100 p-2 z-[100] flex justify-around items-center">
        <button onclick="showPage('itinerary')" id="btn-itinerary" class="flex flex-col items-center p-3 text-gray-400 nav-active">
            <span class="text-xl">🗓️</span><span class="text-[10px]">行程預覽</span>
        </button>
        <button onclick="showPage('guide')" id="btn-guide" class="flex flex-col items-center p-3 text-gray-400">
            <span class="text-xl">🗺️</span><span class="text-[10px]">在地指南</span>
        </button>
        <button onclick="window.open('https://maps.app.goo.gl/1zug2gTcfbfFptLx9')" class="flex flex-col items-center p-3 text-gray-400">
            <span class="text-xl">🎢</span><span class="text-[10px]">USJ導航</span>
        </button>
    </nav>

    <script>
        const itineraryData = {
            "7/22": { title: "抵達大阪", items: [
                { time: "18:20", cat: "交通", name: "桃園機場起飛", desc: "捷星航空GK054 (6A6B)", map: "https://maps.app.goo.gl/w3gjdur5NwJeFU5B6", img: "https://images.unsplash.com/photo-1529074963764-98f45c47344b?w=600", story: "冒險開始！桃園機場是台灣的門戶。記得在機上休息，落地後還有一段機場快線的路程喔！", trans: "⬇️ 機場接駁 (車程47分)" },
                { time: "22:00", cat: "交通", name: "關西機場 T1", desc: "辦理入境與領取行李", map: "https://maps.app.goo.gl/w3gjdur5NwJeFU5B6", img: "https://images.unsplash.com/photo-1570610155223-66279ba81b41?w=600", story: "關西機場是填海造陸建成的海上機場。我們要趕往市區，感受日本鐵道的安靜節奏。", trans: "⬇️ 南海電鐵直達難波" },
                { time: "00:00", cat: "住宿", name: "住一八號店", desc: "簽到碼: 22280049", map: "https://maps.app.goo.gl/bh2bAv3TtiEZEvw18", img: "https://images.unsplash.com/photo-1621266592285-05574581297e?w=600", story: "今晚入住難波區域。離道頓堀很近，如果肚子餓了，周邊還有不少深夜食堂！" }
            ]},
            "7/23": { title: "市區巡禮", items: [
                { time: "08:15", cat: "景點", name: "心齋橋筋商店街", desc: "藥妝、服飾、雜貨天堂", map: "https://maps.app.goo.gl/Foh3iYSnCBJzmCvD8", img: "https://images.unsplash.com/photo-1590559899731-a382839e5549?w=600", story: "三百多年歷史的商圈。拱廊設計讓你在晴雨天都能優雅購物！記得看抬頭看看屋頂建築設計。", trans: "⬇️ 步行5分鐘" },
                { time: "11:19", cat: "美食", name: "Red Rock 和牛丼", desc: "肉食控必吃的火山丼飯", map: "https://maps.app.goo.gl/fYdFXyDovHwkYsze6", img: "https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=600", story: "這家店以『堆得像山一樣高』的烤牛肉丼聞名。日本白米飯配上特製優格醬與半熟蛋，絕對美味！", trans: "⬇️ 車程15分鐘" },
                { time: "12:19", cat: "景點", name: "難波八阪神社", desc: "巨大獅子殿・消災招福", map: "https://maps.app.goo.gl/xaEeLvwv8URWLmDJ7", img: "https://images.unsplash.com/photo-1605051873138-02837332c021?w=600", story: "巨大的獅子頭高 12 公尺，據說能吸走厄運。這是一個祈求勝負運、商賣繁盛非常有名的神社！", trans: "⬇️ 地鐵直達" },
                { time: "18:52", cat: "景點", name: "道頓堀商圈", desc: "21:00 預約觀光船", map: "https://maps.app.goo.gl/FHS79DD4FvMirG1c6", img: "https://images.unsplash.com/photo-1542931237-323a19592c34?w=600", story: "大阪『吃倒文化』起源地。浮誇招牌、巨型章魚，一定要站在戎橋上和固力果跑跑人合影！" }
            ]},
            "7/24": { title: "古都京都", items: [
                { time: "08:46", cat: "景點", name: "清水寺", desc: "世界文化遺產，懸空舞台", map: "https://maps.app.goo.gl/YgaEiF9KVgoMikGW6", img: "https://images.unsplash.com/photo-1528360983277-13d401cdc186?w=600", story: "清水舞台完全沒用一根釘子。這裡祈求健康、學業與姻緣非常靈驗，記得去音羽瀑布喝一口清泉。", trans: "⬇️ 沿著二年坂步行" },
                { time: "14:30", cat: "美食", name: "錦市場", desc: "京都的廚房・庶民美食", map: "https://maps.app.goo.gl/tNME93m7qocw65yK8", img: "https://images.unsplash.com/photo-1542641728-6ca359b085f4?w=600", story: "四百多年歷史，集中了京都所有的美味。從漬物、玉子燒到新鮮海鮮，體驗最真實的京都生活。" }
            ]},
            "7/25": { title: "環球冒險", items: [
                { time: "07:30", cat: "景點", name: "日本環球影城", desc: "USJ 冒險一整天", map: "https://maps.app.goo.gl/1zug2gTcfbfFptLx9", img: "https://images.unsplash.com/photo-1621252179027-94459d278660?w=600", story: "準備進入馬力歐與哈利波特的魔法世界！記得穿雙好走的鞋。今日是戰鬥日！" }
            ]}
        };

        function showPage(p) {
            document.querySelectorAll('.page-content').forEach(el => el.classList.remove('page-active'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('nav-active'));
            document.getElementById('page-' + p).classList.add('page-active');
            document.getElementById('btn-' + p).classList.add('nav-active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showStory(name, storyText) {
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal-body').innerText = storyText || "內容準備中...";
            document.getElementById('story-modal').style.display = 'flex';
        }

        function closeStory() {
            document.getElementById('story-modal').style.display = 'none';
        }

        function renderDay(dayKey) {
            const data = itineraryData[dayKey];
            const content = document.getElementById('itinerary-content');
            let html = `<div class="space-y-4 relative"><div class="absolute left-4 top-0 bottom-0 w-0.5 bg-gray-100"></div>`;
            
            data.items.forEach((item) => {
                html += `
                    <div class="relative pl-10">
                        <div class="absolute left-2 top-2 w-4 h-4 bg-fuji-blue rounded-full border-4 border-white shadow-sm z-10"></div>
                        <div class="bg-white rounded-[28px] shadow-sm overflow-hidden border border-gray-50">
                            <img src="${item.img}" class="w-full h-32 object-cover" loading="lazy">
                            <div class="p-4">
                                <div class="flex justify-between items-start mb-2">
                                    <span class="cat-tag cat-tag-${item.cat}">${item.cat}</span>
                                    <span class="text-xs font-bold text-gray-300">${item.time}</span>
                                </div>
                                <h3 class="font-bold text-base mb-1">${item.name}</h3>
                                <p class="text-[11px] text-gray-400 mb-4">${item.desc}</p>
                                <div class="grid grid-cols-2 gap-2">
                                    <a href="${item.map}" target="_blank" class="bg-blue-50 text-fuji-blue text-center py-2.5 rounded-xl text-[11px] font-bold">📍 導航</a>
                                    <button onclick="showStory('${item.name}', '${item.story}')" class="bg-red-50 text-red-400 text-center py-2.5 rounded-xl text-[11px] font-bold">🚩 故事</button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                if (item.trans) {
                    html += `<div class="pl-14 py-2 text-gray-400 font-bold italic text-[10px]">${item.trans}</div>`;
                }
            });
            content.innerHTML = html + "</div>";
            document.getElementById('countdown-badge').classList.toggle('hidden', dayKey !== '7/25');
        }

        // 初始化
        const dateNav = document.getElementById('date-nav');
        Object.keys(itineraryData).forEach((day, idx) => {
            const btn = document.createElement('button');
            btn.className = `flex-shrink-0 px-6 py-2 rounded-full border border-gray-100 text-sm font-bold bg-white text-gray-400 transition-all`;
            if(idx === 1) btn.classList.add('tab-active'); // 預設顯示第二天
            btn.innerText = day;
            btn.onclick = () => {
                document.querySelectorAll('#date-nav button').forEach(b => b.classList.remove('tab-active'));
                btn.classList.add('tab-active');
                renderDay(day);
                btn.scrollIntoView({ behavior: 'smooth', inline: 'center' });
            };
            dateNav.appendChild(btn);
        });

        // 倒計時 (目標 2026/07/22)
        const target = new Date('2026-07-22');
        const updateCountdown = () => {
            const now = new Date();
            const diff = Math.ceil((target - now) / (1000 * 60 * 60 * 24));
            document.getElementById('countdown-text').innerText = diff > 0 ? `距離出發還有 ${diff} 天` : "冒險進行中！";
        };
        updateCountdown();
        renderDay("7/23");
    </script>
</body>
</html>
